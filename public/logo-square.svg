<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Fond blanc -->
  <rect width="500" height="500" fill="white"/>
  <!-- Cercle bleu marine -->
  <circle cx="250" cy="250" r="245" fill="#0f2744"/>
  <!-- Icone maison -->
  <polygon points="250,105 130,210 155,210 155,345 220,345 220,280 280,280 280,345 345,345 345,210 370,210" fill="white"/>
  <!-- Fenetre maison -->
