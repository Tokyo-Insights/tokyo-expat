  <!-- Tokyo en blanc -->
  <text x="250" y="390" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" text-anchor="middle" fill="white" letter-spacing="-1">Tokyo</text>
  <!-- Expat en rouge -->
  <text x="250" y="460" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" text-anchor="middle" fill="#e84141" letter-spacing="-1">Expat</text>
</svg>
